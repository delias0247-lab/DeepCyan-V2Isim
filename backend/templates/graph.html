<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepCyan · Graph</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <i class="fas fa-car"></i>
        <span>Deep<span class="highlight">Cyan</span></span>
      </div>

      <nav class="nav">
        <ul>
          <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
          <li><a href="/simulation"><i class="fas fa-play-circle"></i> Simulation</a></li>
          
          <li><a href="/data"><i class="fas fa-table"></i> Data</a></li>
          <li class="active"><a href="/graph"><i class="fas fa-chart-line"></i> Graph</a></li>
        </ul>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <header class="header">
        <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        <div class="search">
          <i class="fas fa-search"></i>
          <input id="plotSearchInput" type="text" placeholder="Search plots...">
        </div>
        <div class="user-profile">
          <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">
          <span>ADMIN@RTA</span>
        </div>
      </header>

      <div class="content">

        <div class="simulation-panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
            <h2><i class="fas fa-chart-line"></i> Simulation Graphs</h2>
            <a class="btn" href="/graph/comparison"><i class="fas fa-scale-balanced"></i> traci5 vs traci6 Comparison</a>
          </div>

          <div class="map-controls">

            <!-- Select Map/Run -->
            <div class="map-card">
              <h3><i class="fas fa-sliders"></i> Select Map & Run</h3>

              <div class="param-row">
                <span class="param-label">Map</span>
                <select id="graphMapSelect" class="param-value" style="width: 220px;"></select>
              </div>

              <div class="param-row">
                <span class="param-label">Run</span>
                <select id="graphRunSelect" class="param-value" style="width: 220px;"></select>
              </div>

              <div style="margin-top: 12px;">
                <a class="btn" id="openPlotsBtn" href="#" target="_blank" style="display:none;">
                  <i class="fas fa-folder-open"></i> Open Plots Folder
                </a>
              </div>

              <p style="margin-top:10px; color:#64748b; font-size:0.9rem;">
                <b>Tip:</b> Select a map, then a run folder (run_..._RL), then plots will appear.
              </p>
            </div>

            <!-- Plots -->
            <div class="map-card">
              <h3><i class="fas fa-images"></i> Plots</h3>
              <div id="plotsBox" style="margin-top: 10px;">Loading…</div>
            </div>

          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/static/js/dashboard_models.js"></script>
</body>
</html>
